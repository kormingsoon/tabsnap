<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TabSnap</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="dashboard.css">
</head>
<body>
  <div id="dashboard">
    <aside class="sidebar">
      <div class="sidebar-logo">
        <svg class="logo-icon" width="28" height="28" viewBox="0 0 26 26" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="1" y="11" width="13" height="12" rx="2.5" fill="currentColor" opacity="0.18"/>
          <rect x="4" y="8" width="13" height="12" rx="2.5" fill="currentColor" opacity="0.45"/>
          <rect x="8" y="4" width="17" height="13" rx="2.5" fill="currentColor"/>
          <rect x="10.5" y="6.5" width="5" height="1.5" rx="0.75" fill="white" opacity="0.55"/>
          <rect x="10.5" y="10" width="11" height="1" rx="0.5" fill="white" opacity="0.2"/>
          <rect x="10.5" y="12.5" width="8" height="1" rx="0.5" fill="white" opacity="0.14"/>
        </svg>
        <span class="logo-wordmark">TabSnap</span>
      </div>
      <nav class="sidebar-nav">
        <button type="button" class="nav-item active" data-section="all-tabs" aria-label="All Tabs">
          <span class="nav-icon" aria-hidden="true">⊞</span> All Tabs
        </button>
        <button type="button" class="nav-item" data-section="groups" aria-label="Groups">
          <span class="nav-icon" aria-hidden="true">◫</span> Groups
        </button>
        <button type="button" class="nav-item" data-section="recent" aria-label="Recent">
          <span class="nav-icon" aria-hidden="true">↺</span> Recent
        </button>
        <button type="button" class="nav-item" data-section="analytics" aria-label="Analytics">
          <span class="nav-icon" aria-hidden="true">◈</span> Analytics
        </button>
      </nav>
      <div class="sidebar-footer">
        <button type="button" id="open-home-tabs" class="sidebar-action-btn">⌂ Open Home Tabs</button>
      </div>
    </aside>

    <main class="main-content">
      <div class="main-header">
        <label for="dash-search" class="sr-only">Search tabs</label>
        <input type="text" id="dash-search" placeholder="Search tabs..." autocomplete="off">
        <button type="button" id="dash-ai-group" class="dash-btn primary" aria-label="AI Group Tabs">
          <span aria-hidden="true">✦</span> AI Group Tabs
        </button>
      </div>
      <div id="section-all-tabs" class="section"></div>
      <div id="section-groups" class="section hidden" hidden></div>
      <div id="section-recent" class="section hidden" hidden></div>
      <div id="section-analytics" class="section hidden" hidden></div>
    </main>
  </div>
  <script src="dashboard.js"></script>
</body>
</html>
